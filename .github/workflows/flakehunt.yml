name: FlakeHunt Analysis

# Fires after your test workflow completes.
# Change "CI" below to match the name of your test workflow.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: read          # read workflow logs
  pull-requests: write   # post PR comment
  contents: read         # read test files

jobs:
  analyse:
    # Only run when:
    #   1. The upstream workflow actually failed (skip green runs — zero AI cost)
    #   2. The event that triggered the upstream workflow was a PR, schedule,
    #      manual dispatch, or a push directly to the default branch (merge).
    #
    # Raw branch pushes are intentionally excluded:
    #   - If the branch has a PR open, the pull_request event already fires on
    #     push, so running on both would analyse the same failure twice and
    #     double the AI cost.
    #   - If there is no PR yet, there is no comment target anyway.
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      (
        github.event.workflow_run.event == 'pull_request'     ||
        github.event.workflow_run.event == 'schedule'         ||
        github.event.workflow_run.event == 'workflow_dispatch'||
        (
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == github.event.repository.default_branch
        )
      )

    runs-on: ubuntu-latest

    steps:
      - name: Analyse flaky tests
        uses: yourusername/flakehunt@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token:      ${{ secrets.GITHUB_TOKEN }}
          # Optional: raise the bar — only post fixes with ≥80% confidence
          # confidence-threshold: '80'
